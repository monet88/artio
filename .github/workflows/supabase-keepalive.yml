name: Supabase Keep Alive

on:
  schedule:
    # Run every 4 days at 06:00 UTC (13:00 Vietnam time)
    - cron: '0 6 */4 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")
          echo "Supabase REST API response: $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 500 ]; then
            echo "Supabase is alive!"
          else
            echo "Warning: Unexpected response code $response"
            exit 1
          fi
